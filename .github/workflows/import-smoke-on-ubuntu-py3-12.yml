name: import-smoke
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Replaces the formerly-inlined install-check job with a thin `uses:` call
# into scitex-ai/.github reusable workflows — same job body, now centrally
# maintained. Triggers preserved verbatim from the prior local file.
#
# New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *"  # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

jobs:
  import-smoke:
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit
