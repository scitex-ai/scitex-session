name: tests
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Replaces the formerly-inlined pytest-matrix job with a thin `uses:` call
# into scitex-ai/.github reusable workflows — same job body, now centrally
# maintained. Triggers preserved verbatim from the prior local file.
#
# New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *"  # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

jobs:
  pytest-matrix:
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit
