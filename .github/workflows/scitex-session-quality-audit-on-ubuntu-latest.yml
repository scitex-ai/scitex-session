name: quality
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Replaces the formerly-inlined audit job with a thin `uses:` call into
# scitex-ai/.github reusable workflows — same job body (derives the
# package name from this repo's own pyproject.toml automatically), now
# centrally maintained. Triggers preserved verbatim from the prior local
# file.
#
# New required-status-check context: "quality-audit / audit"

on:
  schedule:
    - cron: "0 18 * * *"  # 18:00 UTC (~03:00 JST), after Test
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/scitex-session-quality-audit-on-ubuntu-latest.yml"
  pull_request:
    branches: [main, develop]

jobs:
  quality-audit:
    uses: scitex-ai/.github/.github/workflows/quality-audit.yml@main
    secrets: inherit
