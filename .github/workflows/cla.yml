name: CLA Assistant
# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers/permissions preserved verbatim from the prior local file.
# owner_allowlist here includes LLEmacs in addition to the reusable
# workflow's default "bot*,ywatanabe1989" — passed as an explicit `with:`
# override so that allowance is not lost.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"
    secrets: inherit
